services:
  nginx:
    image: nginx:1.29.8-alpine
    restart: unless-stopped
    ports:
      - 127.0.0.1:8080:80
    volumes:
      - /repo:/usr/share/nginx/html:ro

  repo-sync:
    image: ghcr.io/thomasstauffer666/repo-sync:latest
    restart: unless-stopped
    ports:
      - 127.0.0.1:8081:8080
    environment:
      - REPO_URL=${REPO_URL}
      - SYNC_AUTO_INTERVAL_TIME=0 5 * * *
      - SYNC_COOLDOWN_SECONDS=300
      - POST_PULL_COMMAND=pwd ; date
    volumes:
      - /repo:/srv/repo-sync/repo
      - /etc/localtime:/etc/localtime:ro
